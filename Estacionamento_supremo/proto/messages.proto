syntax = "proto3";

message DiscoveryMessage {
  string sensor_id = 1;
  string sensor_type = 2;
  string ip = 3;
  int32 tcp_port = 4;
  bool active = 5;
}

message SensorData {
  string sensor_id = 1;
  string sensor_type = 2;
  int32 vaga_id = 3;
  string acao = 4;   // ENTRADA, SAIDA, OCUPADA, LIVRE
  int64 timestamp = 5;
}

message ControlCommand {
  string command = 1;
  string value = 2;
}
